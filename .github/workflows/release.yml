name: 构建发布

# 推送形如 v1.0.0 的 tag 时，自动在 Windows 与 macOS 上各构建 full 与 lite
# 两档并发布到 Releases。用法：改好 src/version.py 后 →
#   git tag v1.0.0 && git push origin v1.0.0
# 也可在 Actions 页手动触发（workflow_dispatch）：只构建、不发布，用于验证。
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      profile:
        description: 构建档位
        type: choice
        options: [both, full, lite]
        default: both

permissions:
  contents: write        # 创建 Release 需要

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]  # macos-latest=Apple 芯片；Intel 版请在 Intel Mac 上从源码构建
        profile: [full, lite]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: 程序
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 构建 ${{ matrix.profile }}（${{ matrix.os }}）
        env:
          PYTHONUTF8: "1"
        run: python build.py --profile ${{ matrix.profile }} --zip

      - name: 收集 zip
        id: find
        shell: pwsh
        run: |
          $zip = Get-ChildItem release -Recurse -Filter *-${{ matrix.profile }}*.zip | Select-Object -First 1
          "zip=$($zip.FullName)" >> $env:GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.find.outputs.zip }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
          body: |
            自动构建产物。Windows 与 macOS 各两档，任选其一：
            - **full**：含扫描版 OCR，功能完整（较大）
            - **lite**：不含 OCR，体积约为 full 的一半

            文件名带 `-mac-arm64` 的是 macOS（Apple 芯片）版；其余为 Windows 版。
            Intel Mac 暂请从源码运行。macOS 首次打开若被系统拦下，见仓库
            《程序/docs/Mac使用说明.md》。

            本软件依据 AGPL-3.0 发布，源代码即本仓库。

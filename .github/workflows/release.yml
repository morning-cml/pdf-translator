name: 构建发布

# 推送形如 v1.0.0 的 tag 时，自动构建 full 与 lite 两档并发布到 Releases。
# 用法：改好 src/version.py 后 → git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      profile:
        description: 构建档位
        type: choice
        options: [both, full, lite]
        default: both

permissions:
  contents: write        # 创建 Release 需要

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        profile: [full, lite]
      fail-fast: false
    defaults:
      run:
        working-directory: 程序
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 构建 ${{ matrix.profile }}
        env:
          PYTHONUTF8: "1"
        run: python build.py --profile ${{ matrix.profile }} --zip

      - name: 收集 zip
        id: find
        shell: pwsh
        run: |
          $zip = Get-ChildItem release -Recurse -Filter *-${{ matrix.profile }}.zip | Select-Object -First 1
          "zip=$($zip.FullName)" >> $env:GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}
          path: ${{ steps.find.outputs.zip }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
          body: |
            自动构建产物。两档任选其一：
            - **full**：含扫描版 OCR，功能完整（较大）
            - **lite**：不含 OCR，体积约为 full 的一半

            本软件依据 AGPL-3.0 发布，源代码即本仓库。
